



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Ambush Checking Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ══ INDIAN RAILWAYS COLOUR PALETTE ══
           Navy  : #0a2060  (dark header bg)
           Mid   : #1a3a8f  (lighter navy)
           Gold  : #f5c300  (yellow accent)
           Light : #e8edf8  (form background)
           White : #ffffff
        */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #d0e8f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* ── Header: matches screenshot exactly ── */
        .header {
            background: #0a2060;
            color: white;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 4px solid #f5c300;
        }

        .header .logo {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            height: 90px;
            width: auto;
        }

        .header .header-text {
            text-align: center;
        }

        .header h1 {
            font-size: 1.55em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            margin: 0;
        }

        .header .division-tag {
            font-size: 0.85em;
            font-weight: bold;
            color: #f5c300;
            letter-spacing: 3px;
            margin-top: 6px;
            text-transform: uppercase;
            background: rgba(245,195,0,0.15);
            display: inline-block;
            padding: 2px 14px;
            border-radius: 3px;
        }

        /* ── Auto-save status bar ── */
        .autosave-bar {
            background: #1a3a8f;
            border-bottom: 3px solid #f5c300;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }

        .autosave-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cfd8f5;
        }

        .autosave-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f5c300;
            animation: pulse 2s infinite;
        }

        .autosave-dot.saving {
            background: #ff9800;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .clear-draft-btn {
            background: transparent;
            color: #f5c300;
            border: 1.5px solid #f5c300;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .clear-draft-btn:hover {
            background: #f5c300;
            color: #0a2060;
        }

        .form-container {
            padding: 30px;
            background: #e8edf8;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #1565c0;
            color: white;
        }

        th {
            padding: 13px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid #1565c0;
            text-transform: uppercase;
            color: #f5c300;
        }

        tbody tr { transition: background-color 0.3s; }
        tbody tr:nth-child(odd)  { background-color: #f0f3fc; }
        tbody tr:nth-child(even) { background-color: #ffffff; }
        tbody tr:hover           { background-color: #dce5f5; }

        td {
            padding: 10px;
            border: 1px solid #b0bfe8;
            text-align: center;
            font-size: 12px;
        }

        td:first-child {
            font-weight: bold;
            background-color: #e8edf8;
            font-size: 12px;
            color: #0a2060;
        }

        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #b0bfe8;
            border-radius: 5px;
            font-size: 12px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1a3a8f;
            box-shadow: 0 0 8px rgba(26,58,143,0.3);
        }

        .info-fields {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-field {
            flex: 0 1 350px;
        }

        .info-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #0a2060;
            font-size: 12px;
        }

        .info-field input { width: 100%; font-size: 12px; }

        /* ── Two CLI / Signature section ── */
        .cli-signature-section {
            margin-top: 20px;
            background: white;
            border: 2px solid #b0bfe8;
            border-top: 4px solid #f5c300;
            border-radius: 10px;
            padding: 20px;
        }

        .cli-signature-section h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: #0a2060;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-bottom: 2px solid #f5c300;
            padding-bottom: 8px;
        }

        .cli-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .cli-col {
            flex: 1 1 300px;
            background: #f0f3fc;
            border: 1.5px solid #b0bfe8;
            border-radius: 8px;
            padding: 15px;
        }

        .cli-col h4 {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            background: #0a2060;
            color: #f5c300;
            padding: 6px 10px;
            border-radius: 5px;
        }

        .cli-col .field-group {
            margin-bottom: 10px;
        }

        .cli-col label {
            display: block;
            font-weight: bold;
            font-size: 11px;
            color: #0a2060;
            margin-bottom: 4px;
        }

        .sig-preview {
            margin-top: 8px;
            display: none;
        }

        .sig-preview img {
            max-width: 200px;
            max-height: 80px;
            border: 2px solid #0a2060;
            border-radius: 5px;
        }

        /* ── Top info strip ── */
        .top-info-strip {
            background: white;
            border: 2px solid #b0bfe8;
            border-top: 4px solid #f5c300;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: flex-end;
        }

        .top-info-strip .tif {
            flex: 1 1 200px;
        }

        .top-info-strip .tif label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            color: #000000;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: none;
        }

        .top-info-strip .tif input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #b0bfe8;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #0a2060;
            background: #f0f3fc;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .top-info-strip .tif input:focus {
            outline: none;
            border-color: #0a2060;
            box-shadow: 0 0 8px rgba(10,32,96,0.25);
            background: #fff;
        }

        .remarks-section {
            margin-top: 20px;
            margin-bottom: 15px;
        }

        .remarks-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #0a2060;
            font-size: 12px;
        }

        .remarks-section textarea {
            width: 100%;
            font-size: 12px;
            min-height: 60px;
            border: 1px solid #b0bfe8;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .add-row-btn { background: #f5c300; color: #0a2060; }
        .add-row-btn:hover { background: #e0b000; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        .submit-btn { background: #0a2060; color: #f5c300; }
        .submit-btn:hover { background: #1a3a8f; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        .pdf-btn { background: #c0392b; color: white; }
        .pdf-btn:hover { background: #a93226; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        .message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .message.success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .message.error   { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.1em; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
            .cli-row { flex-direction: column; }
        }
    </style>
</head>

<script>
/* ═══════════════════════════════════════════════════
   ROW MANAGEMENT
═══════════════════════════════════════════════════ */
const TOTAL_DEFAULT_ROWS = 10;
let rowCount = 0;

function makeRowHTML(n) {
    return `
        <td class="row-number">${n}</td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td>
            <select>
                <option value="">Select</option>
                <option value="Switch On">Switch On</option>
                <option value="Switch Off">Switch Off</option>
            </select>
        </td>
        <td><input type="text"></td>
        <td><textarea rows="2"></textarea></td>
    `;
}

function buildDefaultRows(count) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (let i = 1; i <= count; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = makeRowHTML(i);
        tbody.appendChild(tr);
    }
    rowCount = count;
}

function addRow() {
    rowCount++;
    const tbody = document.getElementById('tableBody');
    const tr = document.createElement('tr');
    tr.innerHTML = makeRowHTML(rowCount);
    tbody.appendChild(tr);
    attachInputListeners(tr);
    showMessage('Row added successfully!', 'success');
    saveFormData();
}

function updateRowNumbers() {
    document.querySelectorAll('#tableBody tr').forEach((row, i) => {
        row.querySelector('.row-number').textContent = i + 1;
    });
    rowCount = document.querySelectorAll('#tableBody tr').length;
}

/* ═══════════════════════════════════════════════════
   SIGNATURE PREVIEW
═══════════════════════════════════════════════════ */
function previewSignature(event, imgId, previewId) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById(imgId).src = e.target.result;
            document.getElementById(previewId).style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

/* ═══════════════════════════════════════════════════
   AUTO-SAVE  (localStorage)
═══════════════════════════════════════════════════ */
const STORAGE_KEY = 'mobileAmbushDraft';
let isSubmitted = false;
let saveTimer = null;

function collectFormData() {
    const rows = [];
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const cells = row.querySelectorAll('input, select, textarea');
        rows.push({
            name:        cells[0] ? cells[0].value : '',
            crewId:      cells[1] ? cells[1].value : '',
            designation: cells[2] ? cells[2].value : '',
            callLogs:    cells[3] ? cells[3].value : '',
            mobileStatus:cells[4] ? cells[4].value : '',
            callingTime: cells[5] ? cells[5].value : '',
            remarks:     cells[6] ? cells[6].value : ''
        });
    });

    return {
        conductedBy:   document.getElementById('conductedBy').value,
        ambushDate:    document.getElementById('ambushDate').value,
        placeOfAmbush: document.getElementById('placeOfAmbush').value,
        ambushTime:    document.getElementById('ambushTime').value,
        formDate:      document.getElementById('formDate').value,
        cliName:       document.getElementById('cliName').value,
        cliName2:      document.getElementById('cliName2').value,
        otherRemarks:  document.getElementById('otherRemarks').value,
        rowCount:      rows.length,
        rows
    };
}

function saveFormData() {
    // Visual indicator – dot turns orange while saving
    const dot = document.getElementById('saveDot');
    dot.classList.add('saving');

    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        try {
            const data = collectFormData();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            const now = new Date();
            const t = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('saveStatus').textContent = `Draft saved at ${t}`;
        } catch(e) {
            document.getElementById('saveStatus').textContent = 'Auto-save failed (storage full?)';
        }
        dot.classList.remove('saving');
    }, 600); // debounce 600 ms
}

function restoreFormData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);

        // Rebuild rows to match saved count
        const savedRowCount = data.rowCount || TOTAL_DEFAULT_ROWS;
        buildDefaultRows(Math.max(savedRowCount, TOTAL_DEFAULT_ROWS));

        // Restore header fields
        if (data.conductedBy)   document.getElementById('conductedBy').value   = data.conductedBy;
        if (data.ambushDate)    document.getElementById('ambushDate').value     = data.ambushDate;
        if (data.placeOfAmbush) document.getElementById('placeOfAmbush').value = data.placeOfAmbush;
        if (data.ambushTime)    document.getElementById('ambushTime').value     = data.ambushTime;
        if (data.formDate)    document.getElementById('formDate').value    = data.formDate;
        if (data.cliName)     document.getElementById('cliName').value     = data.cliName;
        if (data.cliName2)    document.getElementById('cliName2').value    = data.cliName2;
        if (data.otherRemarks)document.getElementById('otherRemarks').value= data.otherRemarks;

        // Restore table rows
        const rows = document.querySelectorAll('#tableBody tr');
        (data.rows || []).forEach((rd, i) => {
            if (!rows[i]) return;
            const cells = rows[i].querySelectorAll('input, select, textarea');
            if (cells[0]) cells[0].value = rd.name        || '';
            if (cells[1]) cells[1].value = rd.crewId      || '';
            if (cells[2]) cells[2].value = rd.designation || '';
            if (cells[3]) cells[3].value = rd.callLogs    || '';
            if (cells[4]) cells[4].value = rd.mobileStatus|| '';
            if (cells[5]) cells[5].value = rd.callingTime || '';
            if (cells[6]) cells[6].value = rd.remarks     || '';
        });

        const saved = new Date(JSON.parse(raw).savedAt || Date.now());
        document.getElementById('saveStatus').textContent = 'Draft restored – last saved earlier';
    } catch(e) {
        console.warn('Could not restore draft:', e);
    }
}

function clearDraft() {
    if (!confirm('Delete the saved draft? All unsaved data will be lost.')) return;
    localStorage.removeItem(STORAGE_KEY);
    buildDefaultRows(TOTAL_DEFAULT_ROWS);
    document.getElementById('conductedBy').value   = '';
    document.getElementById('ambushDate').value     = '';
    document.getElementById('placeOfAmbush').value = '';
    document.getElementById('ambushTime').value     = '';
    document.getElementById('formDate').value     = '';
    document.getElementById('cliName').value      = '';
    document.getElementById('cliName2').value     = '';
    document.getElementById('otherRemarks').value = '';
    attachAllListeners();
    isSubmitted = false;
    document.getElementById('saveStatus').textContent = 'Draft cleared';
    showMessage('Draft cleared successfully!', 'success');
}

/* ═══════════════════════════════════════════════════
   ATTACH INPUT LISTENERS
═══════════════════════════════════════════════════ */
function attachInputListeners(root) {
    root.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('input',  saveFormData);
        el.addEventListener('change', saveFormData);
    });
}

function attachAllListeners() {
    // Static fields
    ['conductedBy','ambushDate','placeOfAmbush','ambushTime','formDate','cliName','cliName2','otherRemarks'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('input',  saveFormData);
            el.addEventListener('change', saveFormData);
        }
    });
    // Table body (observe future rows via delegation)
    document.getElementById('tableBody').addEventListener('input',  saveFormData);
    document.getElementById('tableBody').addEventListener('change', saveFormData);
}

/* ═══════════════════════════════════════════════════
   SUBMIT
═══════════════════════════════════════════════════ */
function submitForm() {
    if (isSubmitted) { showMessage('⚠️ Data already submitted. Clear the draft to submit again.', 'error'); return; }
    const formDate = document.getElementById('formDate').value;
    const cliName  = document.getElementById('cliName').value;
    const cliName2 = document.getElementById('cliName2').value;
    const otherRemarks = document.getElementById('otherRemarks').value || '';

    if (!formDate)  { showMessage('Please select a date!', 'error'); return; }

    const rows = document.querySelectorAll('#tableBody tr');
    const data = [];
    rows.forEach((row, i) => {
        const cells = row.querySelectorAll('input, select, textarea');
        data.push({
            sno:         i + 1,
            name:        cells[0].value,
            crewId:      cells[1].value,
            designation: cells[2].value,
            callLogs:    cells[3].value,
            mobileStatus:cells[4].value,
            callingTime: cells[5].value,
            remarks:     cells[6].value
        });
    });

    const payload = { formDate, cliName, cliName2, otherRemarks, tableData: data };
    showMessage('Submitting data to Google Sheets...', 'success');

    // ── Save to Mobile Ambush sheet ──
    saveToSheet('Mobile Ambush');
}

/* ═══════════════════════════════════════════════════
   GOOGLE SHEETS SAVE — reusable for any sheet
═══════════════════════════════════════════════════ */
const SHEET_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7WDM2HP5ukVhVtQCS2fwdJ2BvKnv9xszb8gMMK273j90Njwb5_nmtfgikZSdGYReciw/exec';

function saveToSheet(sheetName) {
    const cliName1      = document.getElementById('cliName').value   || '';
    const cliName2      = document.getElementById('cliName2').value  || '';
    const date          = document.getElementById('formDate').value  || '';
    const conductedBy   = document.getElementById('conductedBy').value || '';
    const ambushDate    = document.getElementById('ambushDate').value  || '';
    const time          = document.getElementById('ambushTime').value  || '';
    const place         = document.getElementById('placeOfAmbush').value || '';
    const otherRemarks  = document.getElementById('otherRemarks').value  || '';

    // Collect row-level data as JSON string for "remarks" field
    const rows = [];
    document.querySelectorAll('#tableBody tr').forEach((row, i) => {
        const cells = row.querySelectorAll('input, select, textarea');
        const name   = cells[0] ? cells[0].value : '';
        const crewId = cells[1] ? cells[1].value : '';
        const desig  = cells[2] ? cells[2].value : '';
        const callLogs = cells[3] ? cells[3].value : '';
        const mobStatus = cells[4] ? cells[4].value : '';
        const calTime = cells[5] ? cells[5].value : '';
        const rem    = cells[6] ? cells[6].value : '';
        if (name || crewId || desig || callLogs || mobStatus || calTime || rem) {
            rows.push(`[${i+1}] ${name} | ${crewId} | ${desig} | Calls:${callLogs} | Mobile:${mobStatus} | Time:${calTime} | Rem:${rem}`);
        }
    });
    const remarksText = rows.join('\n') || conductedBy;

    // Build URL-encoded body (Apps Script reads e.parameter)
    const params = new URLSearchParams();
    params.append('sheet',         sheetName);
    params.append('cliName1',      cliName1);
    params.append('cliName2',      cliName2);
    params.append('date',          date || ambushDate);
    params.append('time',          time);
    params.append('place',         place);
    params.append('remarks',       remarksText);
    params.append('otherRemarks',  otherRemarks);

    // Validation
    if (!(date || ambushDate)) { showMessage('Please enter a date!', 'error'); return; }

    showMessage('Saving data to Google Sheet......', 'success');

    fetch(SHEET_SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:   params.toString()
    })
    .then(() => {
        isSubmitted = true;
        showMessage('✅ Data saved successfully!', 'success');
    })
    .catch(err => {
        showMessage('❌ Error saving data. Please try again.', 'error');
        console.error(err);
    });
}


/* ═══════════════════════════════════════════════════
   LOBBY INSPECTION SAVE
═══════════════════════════════════════════════════ */
function submitLobbyInspection() {
    var cliName1     = document.getElementById('cliName').value   || '';
    var cliName2     = document.getElementById('cliName2').value  || '';
    var formDate     = document.getElementById('formDate').value  || '';
    var ambushDate   = document.getElementById('ambushDate').value || '';
    var date         = formDate || ambushDate;
    var time         = document.getElementById('ambushTime').value  || '';
    var place        = document.getElementById('placeOfAmbush').value || '';
    var otherRemarks = document.getElementById('otherRemarks').value  || '';

    if (!date)     { showMessage('Please enter a date!', 'error'); return; }

    var rowLines = [];
    document.querySelectorAll('#tableBody tr').forEach(function(row, i) {
        var cells = row.querySelectorAll('input, select, textarea');
        var name = cells[0] ? cells[0].value : '';
        var rem  = cells[6] ? cells[6].value : '';
        if (name || rem) rowLines.push('[' + (i+1) + '] ' + name + ': ' + rem);
    });
    var abnormality = rowLines.join('; ') || otherRemarks || '';

    var params = new URLSearchParams();
    params.append('sheet',            'Lobby Inspection');
    params.append('cliName1',         cliName1);
    params.append('cliName2',         cliName2);
    params.append('date',             date);
    params.append('time',             time);
    params.append('dateOfInspection', date);
    params.append('nameOfLobby',      place);
    params.append('deficiency',       abnormality);

    showMessage('Saving to Lobby Inspection...', 'success');
    fetch(SHEET_SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:   params.toString()
    })
    .then(function() { isSubmitted = true; showMessage('✅ Data saved successfully!', 'success'); })
    .catch(function(err) { showMessage('❌ Error. Please try again.', 'error'); console.error(err); });
}

    doc.setFillColor(...NV);
    doc.rect(0, 0, pageW, 26, 'F');
    // Yellow bottom border line
    doc.setFillColor(245, 195, 0);
    doc.rect(0, 26, pageW, 1.2, 'F');
    // Logo on left
    doc.addImage(logoB64, 'PNG', 4, 2, 20, 22);
    // Heading centred
    doc.setFontSize(14);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(255, 255, 255);
    doc.text('MOBILE AMBUSH CHECKING', pageW / 2, 11, { align: 'center' });
    // Division tag with yellow border box
    const divText = 'RAIPUR DIVISION';
    const divW = doc.getTextWidth(divText) + 10;
    doc.setFillColor(10, 32, 96);
    doc.rect((pageW - divW) / 2, 14, divW, 7, 'F');
    doc.setFontSize(8);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(245, 195, 0);
    doc.text(divText, pageW / 2, 19, { align: 'center' });

    // ── Top info block ──
    const conductedBy   = document.getElementById('conductedBy').value   || '';
    const ambushDate    = formatDateDMY(document.getElementById('ambushDate').value)     || '';
    const placeOfAmbush = document.getElementById('placeOfAmbush').value || '';
    const ambushTime    = document.getElementById('ambushTime').value     || '';

    doc.setFontSize(8);
    let infoY = 34;
    const col1X = 14, col2X = 110;

    subLabel('Conducted By :', col1X,  infoY, conductedBy,   col1X + 34);
    subLabel('Date :',         col2X,  infoY, ambushDate,    col2X + 15);
    infoY += 7;
    subLabel('Place of Ambush :', col1X, infoY, placeOfAmbush, col1X + 40);
    subLabel('Time :',            col2X, infoY, ambushTime,    col2X + 15);
    infoY += 5;

    // gold divider line
    doc.setDrawColor(245, 195, 0);
    doc.setLineWidth(0.6);
    doc.line(14, infoY, pageW - 14, infoY);
    infoY += 3;

    // Table data
    const rows = document.querySelectorAll('#tableBody tr');
    const tableData = [];
    rows.forEach(row => {
        const cells = row.querySelectorAll('input, select, textarea');
        const rn = row.querySelector('.row-number').textContent;
        tableData.push([
            rn,
            cells[0].value || '',
            cells[1].value || '',
            cells[2].value || '',
            cells[3].value || '',
            cells[4].value || '',
            cells[5].value || '',
            cells[6].value || ''
        ]);
    });

    doc.autoTable({
        head: [['S/No.','Name of Crew','Crew ID','Desig.','Call Logs Found','Mobile Status','Calling Time','Remarks']],
        body: tableData,
        startY: infoY,
        theme: 'grid',
        headStyles: { fillColor: [26,58,143], textColor:[255,255,255], fontStyle:'bold', halign:'center', fontSize:9 },
        styles: { fontSize:8, cellPadding:2.5, halign:'center', textColor: [0,0,0] },
        columnStyles: { 0:{cellWidth:10}, 1:{cellWidth:30}, 2:{cellWidth:18}, 3:{cellWidth:18}, 4:{cellWidth:30}, 5:{cellWidth:25}, 6:{cellWidth:18}, 7:{cellWidth:41} },
        alternateRowStyles: { fillColor:[232,237,248] }
    });

    let yPos = doc.lastAutoTable.finalY + 10;

    // ── If more than 20 rows, force remarks/details onto page 2 ──
    if (rows.length > 20) {
        doc.addPage();
        yPos = 20;
    }

    // ── Other Remarks subheading ──
    const otherRemarks = document.getElementById('otherRemarks').value || '';
    const rmkLabelW = pageW - 28;
    doc.setFillColor(26,58,143);
    doc.roundedRect(14, yPos - 4.5, rmkLabelW, 6, 1, 1, 'F');
    doc.setFont(undefined, 'bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text('Other Remarks if any or Any Abnormality:', 16, yPos);
    yPos += 3;
    if (otherRemarks) {
        doc.setFont(undefined,'normal'); doc.setTextColor(0,0,0); doc.setFontSize(8);
        doc.text(doc.splitTextToSize(otherRemarks, rmkLabelW - 4), 16, yPos + 5);
    }
    yPos += 22;

    // ── Date (bottom) ──
    const formDate = formatDateDMY(document.getElementById('formDate').value) || '';
    if (formDate) {
        subLabel('Date :', 14, yPos, formDate, 14 + doc.getTextWidth('Date :') + 6);
    }
    yPos += 10;

    // ── CLI 1 & CLI 2 names + uploaded signatures ──
    // Resolve OTHERS manual entry if selected
    const cliNameSel  = document.getElementById('cliName').value  || '';
    const cliName2Sel = document.getElementById('cliName2').value || '';
    const cliName  = cliNameSel  === 'OTHERS' ? (document.getElementById('cliNameOther').value  || 'OTHERS') : cliNameSel;
    const cliName2 = cliName2Sel === 'OTHERS' ? (document.getElementById('cliName2Other').value || 'OTHERS') : cliName2Sel;
    const sig1File = document.getElementById('signature').files[0];   // belongs to cliName (CLI1)
    const sig2File = document.getElementById('signature2').files[0];  // belongs to cliName2 (CLI2)

    const blockW = 42;
    const leftX  = 14;                    // CLI 2 goes LEFT
    const rightX = pageW - 14 - blockW;   // CLI 1 goes RIGHT

    // Signature boxes — CLI2 left, CLI1 right
    function finalize(sig1DataUrl, sig2DataUrl) {
        if (sig1DataUrl) doc.addImage(sig1DataUrl, 'PNG', leftX,  yPos, blockW, 10);  // cliName sig left
        if (sig2DataUrl) doc.addImage(sig2DataUrl, 'PNG', rightX, yPos, blockW, 10);  // cliName2 sig right

        yPos += 16;
        doc.setFontSize(8); doc.setFont(undefined,'bold'); doc.setTextColor(0,0,0);
        if (cliName)  doc.text(cliName,  leftX,  yPos);   // cliName left
        if (cliName2) doc.text(cliName2, rightX, yPos);   // cliName2 right

        const ts = new Date().toISOString().split('T')[0];
        doc.save(`Mobile_Ambush_Checking_${ts}.pdf`);
        showMessage('PDF generated and downloaded successfully!', 'success');
    }

    let url1 = null, url2 = null, pending = 0;
    function tryFinalize() { if (pending === 0) finalize(url1, url2); }

    if (sig1File) {
        pending++;
        const r = new FileReader();
        r.onload = e => { url1 = e.target.result; pending--; tryFinalize(); };
        r.readAsDataURL(sig1File);
    }
    if (sig2File) {
        pending++;
        const r = new FileReader();
        r.onload = e => { url2 = e.target.result; pending--; tryFinalize(); };
        r.readAsDataURL(sig2File);
    }
    if (!sig1File && !sig2File) finalize(null, null);
}

/* ═══════════════════════════════════════════════════
   SHOW MESSAGE
═══════════════════════════════════════════════════ */
function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}

/* ═══════════════════════════════════════════════════
   OTHERS DROPDOWN TOGGLE
═══════════════════════════════════════════════════ */
function setupOthersDropdown(selectId, boxId) {
    const sel = document.getElementById(selectId);
    const box = document.getElementById(boxId);
    if (!sel || !box) return;
    sel.addEventListener('change', () => {
        box.style.display = sel.value === 'OTHERS' ? 'block' : 'none';
        if (sel.value !== 'OTHERS') {
            const inp = box.querySelector('input');
            if (inp) inp.value = '';
        }
    });
}

/* ═══════════════════════════════════════════════════
   DATE PICKER → DD/MM/YYYY CONVERTER
   type=date inputs return YYYY-MM-DD; convert for display in PDF
═══════════════════════════════════════════════════ */
function formatDateDMY(isoVal) {
    if (!isoVal) return '';
    const [y, m, d] = isoVal.split('-');
    return d && m && y ? d + '/' + m + '/' + y : isoVal;
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
    buildDefaultRows(TOTAL_DEFAULT_ROWS);
    restoreFormData();   // load any saved draft
    attachAllListeners();
    // OTHERS dropdown toggle
    setupOthersDropdown('cliName',  'cliNameOtherBox');
    setupOthersDropdown('cliName2', 'cliName2OtherBox');
    // Restore OTHERS visibility if draft loaded with OTHERS selected
    ['cliName','cliName2'].forEach(id => {
        const sel = document.getElementById(id);
        const box = document.getElementById(id + 'OtherBox');
        if (sel && box && sel.value === 'OTHERS') box.style.display = 'block';
    });
    // date inputs are type=date — no mask needed
});
