        let rowCount = 10;

        function previewSignature(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('signaturePreview');
                    const img = document.getElementById('signatureImg');
                    img.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function addRow() {
            rowCount++;

                <td><input type="text" placeholder="Enter name"></td>
                <td><input type="text" placeholder="Crew ID"></td>
                <td><input type="text" placeholder="Designation"></td>

                </td>
                <td><input type="time"></td>
                <td><textarea rows="2" placeholder="Enter remarks"></textarea></td>
            `;

            tableBody.appendChild(newRow);
            showMessage('Row added successfully!', 'success');
        }

            });

        }

                    callLogs: cells[3].value,
                    mobileStatus: cells[4].value,
                    callingTime: cells[5].value,
                    remarks: cells[6].value
                };

                data.push(rowData);

                otherRemarks: otherRemarks,
                tableData: data
            };

            console.log('Submitting Data:', payload);
            showMessage('Submitting data to Google Sheets...', 'success');

            // Submit to Google Apps Script
            fetch('https://script.google.com/macros/s/AKfycbw4Lyf8w03rCLsQNvvcezkMNZ5D1lW0oyMl4tyndhCq-GeUnvGXPPHXOpAa4LMG9Fnn5Q/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                showMessage('Data submitted successfully to Google Sheets!', 'success');
                console.log('Submission successful!');
            })
            .catch((error) => {
                console.error('Error:', error);
                showMessage('Error submitting data. Please try again.', 'error');
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4'); // Portrait orientation

            // Add title
            doc.setFontSize(20);
            doc.setFont(undefined, 'bold');
            doc.text('MOBILE AMBUSH CHECKING', doc.internal.pageSize.getWidth() / 2, 15, { align: 'center' });

            // Get table data
            const rows = document.querySelectorAll('#tableBody tr');
            const tableData = [];

            rows.forEach((row) => {
                const cells = row.querySelectorAll('input, select, textarea');
                const rowNumber = row.querySelector('.row-number').textContent;

                tableData.push([
                    rowNumber,
                    cells[0].value || '',
                    cells[1].value || '',
                    cells[2].value || '',
                    cells[3].value || '',
                    cells[4].value || '',
                    cells[5].value || '',
                    cells[6].value || ''
                ]);
            });

            // Generate table
            doc.autoTable({
                head: [['S/No.', 'Name of Crew', 'Crew ID', 'Desig.', 'Call Logs Found', 'Mobile Status', 'Calling Time', 'Remarks']],
                body: tableData,
                startY: 25,
                theme: 'grid',
                headStyles: {
                    fillColor: [74, 144, 226],
                    textColor: [255, 255, 255],
                    fontStyle: 'bold',
                    halign: 'center',
                    fontSize: 9
                },
                styles: {
                    fontSize: 8,
                    cellPadding: 2.5,
                    halign: 'center'
                },
                columnStyles: {
                    0: { cellWidth: 10 },
                    1: { cellWidth: 30 },
                    2: { cellWidth: 18 },
                    3: { cellWidth: 18 },
                    4: { cellWidth: 30 },
                    5: { cellWidth: 25 },
                    6: { cellWidth: 18 },
                    7: { cellWidth: 41 }
                },
                alternateRowStyles: {
                    fillColor: [240, 248, 255]
                }
            });

            // Get the Y position after the table
            let yPosition = doc.lastAutoTable.finalY + 10;

            // Get Other Remarks
            const otherRemarks = document.getElementById('otherRemarks').value || '';

            // Add Other Remarks if any with outlined box
            doc.setFontSize(10);
            doc.setFont(undefined, 'bold');
            doc.text('Other Remarks if any:', 14, yPosition);

            // Draw outlined box for Other Remarks
            const boxHeight = 15;
            const boxWidth = 180;
            doc.setDrawColor(74, 144, 226);
            doc.setLineWidth(0.5);
            doc.rect(14, yPosition + 2, boxWidth, boxHeight);

            // Add text inside the box
            if (otherRemarks) {
                doc.setFont(undefined, 'normal');
                const splitOtherRemarks = doc.splitTextToSize(otherRemarks, boxWidth - 4);
                doc.text(splitOtherRemarks, 16, yPosition + 7);
            }

            yPosition += boxHeight + 12;

            // Get CLI Name, Date, and Signature
            const cliNameSelect = document.getElementById('cliName');
            const cliName = cliNameSelect.options[cliNameSelect.selectedIndex].value || '';
            const formDate = document.getElementById('formDate').value || '';
            const signatureFile = document.getElementById('signature').files[0];

            // Add Signature if uploaded
            if (signatureFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgData = e.target.result;
                    const pageWidth = doc.internal.pageSize.getWidth();

                    // Add signature on the right side
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'bold');
                    doc.text('Signature:', pageWidth - 54, yPosition);
                    doc.addImage(imgData, 'PNG', pageWidth - 54, yPosition + 2, 40, 15);

                    // Add Date and CLI Name after signature
                    addDateAndCLI();
                    saveDocument();
                };
                reader.readAsDataURL(signatureFile);
            } else {
                // Add Date and CLI Name without signature
                addDateAndCLI();
                saveDocument();
            }

            function addDateAndCLI() {
                const pageWidth = doc.internal.pageSize.getWidth();
                doc.setFontSize(10);
                doc.setFont(undefined, 'normal');

                // If signature was added, move down
                if (signatureFile) {
                    yPosition += 20;
                }

                // Date on the left
                if (formDate) {
                    doc.text(`Date: ${formDate}`, 14, yPosition);
                }

                // CLI Name on the right (below signature if exists)
                if (cliName) {
                    doc.text(`CLI Name and HQ: ${cliName}`, pageWidth - 14, yPosition, { align: 'right' });
                }
            }

            function saveDocument() {
                // Save PDF
                const timestamp = new Date().toISOString().split('T')[0];
                doc.save(`Mobile_Ambush_Checking_${timestamp}.pdf`);
                showMessage('PDF generated and downloaded successfully!', 'success');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
